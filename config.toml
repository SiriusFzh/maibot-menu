[plugin]
enabled = true
config_version = "1.0.0"

[menu]
exclude_plugins = ["builtin.plugin-management"]
manual_commands = [
    "每日分析|/summary [今天|昨天]|生成群聊总结图片",
    "每日分析|/mysummary [今天|昨天]|生成个人总结图片",
    "每日分析|/mysummary @某人|查看他人个人总结（需权限）",
    "每日60秒新闻|/get_news [image|text]|当前会话获取每日新闻",
    "每日60秒新闻|/news|同 /get_news",
    "每日60秒新闻|/每日新闻|同 /get_news",
    "每日60秒新闻|/news_status|查看下次推送时间",
    "每日60秒新闻|/push_news|管理员手动推送到配置群",
    "群友语录|/投稿|回复图片消息投稿到群语录库",
    "群友语录|/群友语录|随机获取一条群投稿语录",
    "菜单插件|/菜单|显示麦麦所有功能和指令",
]
